name: Mosaic Detector
description: Detects mosaics in images
version: 1.0

exec:
  - python
  - "{pluginDir}/detect.py"

# ここにUI（Settingsタブ）で表示する項目を定義します
settings:
  ReCheckMode:
    displayName: Re-Check Mode
    description: "ON: 全件再判定 / OFF: 未判定のみ"
    type: BOOLEAN
    default: false

tasks:
  - name: "Scan Mosaics"
    description: "画像内のモザイクを判定してタグ付けします"
