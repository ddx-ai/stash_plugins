name: Mosaic Detector
description: "1000px以上の高解像度解析により、微細な正方形モザイクを検出します。"
version: 1.2

exec:
  - python
  - "{pluginDir}/detect.py"

# Stashの仕様に合わせて、エラーの出にくい最小限の構成
settings:
  ReCheckMode:
    displayName: 再判定モード (Re-Check Mode)
    description: "ON: 全件再スキャン / OFF: 未判定のみ"
    type: BOOLEAN

tasks:
  - name: "Scan Mosaics"
    description: "ライブラリ内の画像を精密スキャンします。"
