name: Mosaic Detector
description: "高解像度解析によりモザイクを検出します。面積比率をしきい値で調整可能です。"
version: 1.3

exec:
    - python
    - "{pluginDir}/detect.py"

settings:
    ReCheckMode:
        displayName: 再判定モード (Re-Check Mode)
        description: "ON: 全件再スキャン / OFF: 未判定のみ"
        type: BOOLEAN
    Threshold:
        displayName: 判定しきい値 (Mosaic Coverage Threshold)
        description: "モザイクが画像を占める割合 (0.05〜0.50推奨)。値を上げると判定が厳しくなります。"
        type: NUMBER

tasks:
    - name: "Scan Mosaics"
        description: "設定されたしきい値に基づいて画像をスキャンします。"
