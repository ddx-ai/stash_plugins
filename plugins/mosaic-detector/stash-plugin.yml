name: Mosaic Detector
description: "高解像度解析によりモザイクを検出します。詳細な判定ログを出力します。"
version: 1.5
exec:
  - python
  - "{pluginDir}/detect.py"
settings:
  ReCheckMode:
    displayName: 再判定モード (Re-Check Mode)
    description: "ON: 全件再スキャン / OFF: 未判定のみ"
    type: BOOLEAN
  Threshold:
    displayName: 判定しきい値 (Mosaic Coverage Threshold)
    description: "0.05〜0.50の範囲で入力してください（例: 0.15）"
    type: STRING
tasks:
  - name: "Scan Mosaics"
    description: "設定されたしきい値に基づいて画像をスキャンします。"
