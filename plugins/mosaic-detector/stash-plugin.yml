name: Mosaic Detector
description: 画像内のモザイクを自動検出し、Mosaic/NoMosaicタグを付与します。
version: 1.1

exec:
  - python
  - "{pluginDir}/detect.py"

settings:
  ReCheckMode:
    displayName: 再判定モード (Re-Check Mode)
    description: "ON: すべての画像を再判定 / OFF: 未判定（タグなし）のみスキャン"
    type: BOOLEAN

tasks:
  - name: "Scan Mosaics"
    description: "ライブラリ内の画像をスキャンしてモザイク判定を行います。"
