name: Mosaic Detector
description: Detects mosaics in images
version: 1.0

tasks:
  - name: "Scan Mosaics"
    description: "Scan images for mosaics"
    # ここです。execとargumentsを同じ階層に並べます
    exec:
      - python
      - "{pluginDir}/detect.py"
    # UIに表示するためのパラメータ
    parameters:
      - name: ReCheck
        description: "すでに判定済みの画像も再チェックする"
        type: Boolean
        default: false
