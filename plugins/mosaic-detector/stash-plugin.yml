name: Mosaic Detector
description: Detects mosaics in images
version: 1.0

# 実行コマンドの定義
exec:
  - python
  - "{pluginDir}/detect.py"

# タスクの定義
tasks:
  - name: "Scan Mosaics"
    description: "Scan images for mosaics"
    # UIに表示する引数
    arguments:
      - name: ReCheck
        description: "すでに判定済みの画像も再チェックする"
        type: Boolean
        default: false
