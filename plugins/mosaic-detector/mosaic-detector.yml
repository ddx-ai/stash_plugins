name: Mosaic Detector
description: 勾配角度フィルタリング(v4.0)搭載・10段階モザイク判定プラグイン
version: 1.3
url: https://github.com/ddx-ai/stash_plugins
exec:
  - python
  - "{pluginDir}/detect.py"
interface: raw

# 外部プラグイン設定（Stashの設定 > プラグイン > Mosaic Detector に表示されます）
settings:
  - name: ReCheckMode
    label: 再チェックモード
    type: Boolean
    default: false
    description: 既に判定済みタグ（Mosaic_XX）がある画像も再計算します。
  - name: AngleTolerance
    label: 角度許容誤差 (1-45)
    type: Number
    default: 15
    description: 斜線を排除する厳格さ。小さいほど厳格になります（推奨：15）。
  - name: ThresholdMin
    label: 判定開始しきい値 (0.0-1.0)
    type: Number
    default: 0.1
    description: Mosaic_01として判定を開始する最小スコア。
  - name: TargetTag
    label: 対象タグ限定
    type: String
    default: ""
    description: 特定のタグを持つ画像のみを解析対象にする場合、そのタグ名を入力。

# 実行タスクの定義
tasks:
  - name: Mosaic Detection
    description: ライブラリ内の画像を解析し、01〜09のタグを多段階で付与します。
